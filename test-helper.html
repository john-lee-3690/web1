<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>한자쓰기 테스트 헬퍼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}

.header{
  background:linear-gradient(135deg,#1a1f2e,#0f1117);
  border-bottom:1px solid #2d3748;
  padding:16px 20px;
}
.header h1{font-size:18px;font-weight:700;color:#f6ad55}
.header p{font-size:12px;color:#718096;margin-top:2px}

.main{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}

/* ── 카드 ── */
.card{background:#1a202c;border:1px solid #2d3748;border-radius:12px;padding:16px}
.card-title{font-size:12px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* ── 현재 상태 ── */
.state-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #2d3748}
.state-row:last-child{border-bottom:none}
.state-key{font-size:13px;color:#a0aec0}
.state-val{font-size:13px;font-weight:600;color:#63b3ed;font-family:monospace}
.state-val.warn{color:#f6ad55}
.state-val.ok{color:#68d391}
.state-val.none{color:#4a5568}

/* ── 버튼 ── */
.btn{
  width:100%;padding:15px;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;letter-spacing:-.2px;
}
.btn:active{transform:scale(0.97)}
.btn-danger{background:#c53030;color:#fff}
.btn-danger:hover{background:#9b2c2c}
.btn-restore{background:#2d6a4f;color:#fff}
.btn-restore:hover{background:#1b4332}
.btn-go{background:#3182ce;color:#fff}
.btn-go:hover{background:#2b6cb0}
.btn-neutral{background:#2d3748;color:#a0aec0;border:1px solid #4a5568}
.btn-neutral:hover{background:#4a5568}
.btn:disabled{background:#2d3748;color:#4a5568;cursor:default;transform:none}

/* ── 급수 미리보기 ── */
.grade-preview{display:flex;flex-direction:column;gap:6px}
.grade-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#2d3748;border-radius:8px}
.grade-name{font-size:13px;font-weight:700;color:#e2e8f0;min-width:44px}
.grade-chars{font-size:18px;color:#f6ad55;font-weight:700;flex:1;letter-spacing:2px}
.grade-status{font-size:11px;color:#718096}
.grade-status.loaded{color:#68d391}
.grade-status.pending{color:#f6ad55}

/* ── 상태 배너 ── */
.banner{border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.6;margin-bottom:0}
.banner.info{background:#1a2744;border:1px solid #2b4a7a;color:#90cdf4}
.banner.warn{background:#2d2000;border:1px solid #744210;color:#f6ad55}
.banner.ok{background:#1a2d1a;border:1px solid #276749;color:#68d391}
.banner.danger{background:#2d1a1a;border:1px solid #9b2c2c;color:#fc8181}

/* ── 로그 ── */
.log-wrap{background:#0d1117;border:1px solid #2d3748;border-radius:8px;overflow:hidden}
.log-body{height:160px;overflow-y:auto;padding:10px 12px;font-family:monospace;font-size:12px;line-height:1.7}
.log-line{display:flex;gap:8px}
.log-time{color:#4a5568;flex-shrink:0;font-size:11px}
.log-msg{flex:1;word-break:break-all}
.log-msg.ok{color:#56d364}
.log-msg.warn{color:#e3b341}
.log-msg.err{color:#f85149}
.log-msg.info{color:#8b949e}

/* ── 링크 버튼 ── */
.app-link{
  display:block;width:100%;padding:16px;border-radius:10px;
  background:linear-gradient(135deg,#185fa5,#1D9E75);
  color:#fff;font-size:16px;font-weight:700;text-align:center;
  text-decoration:none;border:none;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.app-link:active{transform:scale(0.97)}
</style>
</head>
<body>

<div class="header">
  <h1>🛠 한자쓰기 테스트 헬퍼</h1>
  <p>신규 유저 플로우 빠른 검증용 · 다른 유저에게 영향 없음</p>
</div>

<div class="main">

  <!-- 안내 배너 -->
  <div class="banner info" id="banner-info">
    ⚙️ 이 기기의 localStorage만 조작합니다.<br>
    서버 데이터나 다른 유저에게는 전혀 영향 없어요.
  </div>

  <!-- 현재 상태 -->
  <div class="card">
    <div class="card-title">현재 localStorage 상태</div>
    <div id="state-rows">로딩 중...</div>
  </div>

  <!-- 백업 상태 -->
  <div class="card" id="backup-card" style="display:none">
    <div class="card-title">백업 저장됨</div>
    <div id="backup-rows"></div>
  </div>

  <!-- 급수별 2자 미리보기 -->
  <div class="card">
    <div class="card-title">테스트 모드 — 급수별 2자</div>
    <div class="grade-preview" id="grade-preview">
      <div style="font-size:13px;color:#4a5568">8급 데이터는 내장 · 나머지는 fetch 후 표시</div>
    </div>
  </div>

  <!-- 로그 -->
  <div class="log-wrap">
    <div class="log-body" id="log-body"></div>
  </div>

  <!-- 액션 버튼들 -->
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-danger" id="btn-setup" onclick="setupTestMode()">
      🧪 테스트 모드 설정 (진도 삭제 + 각 급수 2자)
    </button>
    <button class="btn btn-restore" id="btn-restore" onclick="restoreBackup()" disabled>
      ↩ 원래 데이터로 복원
    </button>
    <a class="app-link" href="./index.html">
      한자쓰기 앱 열기 →
    </a>
    <button class="btn btn-neutral" onclick="refreshState()">↺ 상태 새로고침</button>
  </div>

</div>

<script>
// ── 테스트할 급수 목록 ──
const ALL_GRADES = ['8급','7급','6급','5급','4급a','4급b','3급a','3급b','2급','1급a','1급b'];
const DATA_BASE_URL = './';
const CHARS_PER_GRADE = 2; // 급수별 남길 글자 수

// ── 8급 내장 데이터 (index.html과 동일하게 앞 2자만) ──
// 실제로는 fetch로 가져옴 — 8급만 하드코딩으로 즉시 처리
const GRADE8_SAMPLE = ['一','九']; // 8급 앞 2자

// ── 로그 ──
function log(msg, type='info'){
  const body = document.getElementById('log-body');
  const line = document.createElement('div');
  line.className = 'log-line';
  const t = new Date().toTimeString().slice(0,8);
  line.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

// ── localStorage 키 목록 ──
const LS_KEYS = {
  progress:   'hanja_progress',
  user:       'hanja_user',
  positions:  'hanja_positions',
  testPass:   'hanja_test_pass',
  completeSeen: 'hanja_complete_seen',
  // DB 캐시 키들
  dbKeys: () => ALL_GRADES.slice(1).map(g => 'hanja_db_' + g)
};

function getStorageSize(key){
  try{
    const v = localStorage.getItem(key);
    if(!v) return null;
    const kb = (new Blob([v]).size / 1024).toFixed(1);
    return kb + 'KB';
  }catch(e){ return null; }
}

function getProgressCount(){
  try{
    const p = JSON.parse(localStorage.getItem(LS_KEYS.progress)||'{}');
    return Object.keys(p).length;
  }catch(e){ return 0; }
}

function getDBCacheCount(){
  let cnt = 0;
  LS_KEYS.dbKeys().forEach(k => { if(localStorage.getItem(k)) cnt++; });
  return cnt;
}

// ── 상태 표시 ──
function refreshState(){
  const rows = document.getElementById('state-rows');
  const progressCnt = getProgressCount();
  const dbCacheCnt = getDBCacheCount();
  const hasBackup = !!localStorage.getItem('hanja_TEST_BACKUP');
  const user = JSON.parse(localStorage.getItem(LS_KEYS.user)||'{}');
  const seen = JSON.parse(localStorage.getItem(LS_KEYS.completeSeen)||'[]');

  rows.innerHTML = [
    { k:'진도 데이터', v: progressCnt > 0 ? progressCnt+'자 학습 기록' : '없음', cls: progressCnt>0?'warn':'none' },
    { k:'사용자 정보', v: user.userName || '없음', cls: user.userName?'warn':'none' },
    { k:'급수DB 캐시', v: dbCacheCnt > 0 ? dbCacheCnt+'개 급수 캐시됨' : '없음', cls: dbCacheCnt>0?'warn':'none' },
    { k:'축하화면 기록', v: seen.length > 0 ? seen.join(', ') : '없음', cls: seen.length?'warn':'none' },
    { k:'테스트 백업', v: hasBackup ? '✓ 백업 있음' : '없음', cls: hasBackup?'ok':'none' },
  ].map(r => `
    <div class="state-row">
      <span class="state-key">${r.k}</span>
      <span class="state-val ${r.cls}">${r.v}</span>
    </div>
  `).join('');

  // 백업 카드
  const backupCard = document.getElementById('backup-card');
  if(hasBackup){
    backupCard.style.display = '';
    const backup = JSON.parse(localStorage.getItem('hanja_TEST_BACKUP')||'{}');
    document.getElementById('backup-rows').innerHTML = `
      <div class="state-row"><span class="state-key">백업 시각</span><span class="state-val ok">${backup.savedAt||'-'}</span></div>
      <div class="state-row"><span class="state-key">진도 글자 수</span><span class="state-val ok">${Object.keys(backup.progress||{}).length}자</span></div>
      <div class="state-row"><span class="state-key">사용자명</span><span class="state-val ok">${(backup.user||{}).userName||'없음'}</span></div>
    `;
    document.getElementById('btn-restore').disabled = false;
  } else {
    backupCard.style.display = 'none';
    document.getElementById('btn-restore').disabled = true;
  }

  // 급수 미리보기 업데이트
  refreshPreview();
}

// ── 급수별 미리보기 ──
function refreshPreview(){
  const preview = document.getElementById('grade-preview');
  preview.innerHTML = '';
  ALL_GRADES.forEach(g => {
    const row = document.createElement('div');
    row.className = 'grade-row';
    let chars = '-', statusText = '미로드', statusCls = 'pending';

    if(g === '8급'){
      chars = '全완료';
      try{
        const p = JSON.parse(localStorage.getItem(LS_KEYS.progress)||'{}');
        const doneCnt = ['一','九','十','二','人','七','八','女','大','山','三','小','寸','土','六','木','父','水','五','王','月','日','中','火','母','民','白','北','四','生','外','兄','年','西','先','弟','東','門','長','靑','軍','南','室','校','國','萬','學','韓'].filter(ch=>p[ch]).length;
        statusText = doneCnt === 48 ? '48자 전체 완료처리됨' : '내장 (원본 48자)';
        chars = doneCnt === 48 ? '완료 ✓' : '-';
      }catch(e){ statusText = '내장'; }
      statusCls = 'loaded';
    } else {
      // 캐시에서 확인
      try{
        const cached = localStorage.getItem('hanja_db_' + g);
        if(cached){
          const data = JSON.parse(cached);
          if(data[g] && data[g].length > 0){
            chars = data[g].slice(0, CHARS_PER_GRADE).map(h=>h.char).join(' ');
            statusText = '캐시됨 (' + data[g].length + '자)';
            statusCls = 'loaded';
          }
        } else {
          statusText = 'fetch 필요';
        }
      }catch(e){}
    }

    row.innerHTML = `
      <div class="grade-name">${g}</div>
      <div class="grade-chars">${chars}</div>
      <div class="grade-status ${statusCls}">${statusText}</div>
    `;
    preview.appendChild(row);
  });
}

// ── 백업 저장 ──
function saveBackup(){
  const backup = {
    savedAt: new Date().toLocaleString('ko-KR'),
    progress: JSON.parse(localStorage.getItem(LS_KEYS.progress)||'{}'),
    user:     JSON.parse(localStorage.getItem(LS_KEYS.user)||'{}'),
    positions:JSON.parse(localStorage.getItem(LS_KEYS.positions)||'{}'),
    testPass: JSON.parse(localStorage.getItem(LS_KEYS.testPass)||'{}'),
    completeSeen: JSON.parse(localStorage.getItem(LS_KEYS.completeSeen)||'[]'),
  };
  localStorage.setItem('hanja_TEST_BACKUP', JSON.stringify(backup));
  log('백업 저장 완료 (' + backup.savedAt + ')', 'ok');
  return backup;
}

// ── 테스트 모드 설정 ──
async function setupTestMode(){
  const btn = document.getElementById('btn-setup');
  btn.disabled = true;
  btn.textContent = '⟳ 설정 중...';

  log('━━━ 테스트 모드 설정 시작 ━━━', 'ok');

  // 1. 기존 데이터 백업
  log('기존 데이터 백업 중...', 'info');
  saveBackup();

  // 2. 진도/유저/위치 데이터 삭제
  log('진도 데이터 초기화...', 'info');
  localStorage.removeItem(LS_KEYS.progress);
  localStorage.removeItem(LS_KEYS.user);
  localStorage.removeItem(LS_KEYS.positions);
  localStorage.removeItem(LS_KEYS.testPass);
  localStorage.removeItem(LS_KEYS.completeSeen);
  log('✓ progress / user / positions / testPass / completeSeen 삭제', 'ok');

  // 3. 각 급수 DB 캐시를 2자만 남기도록 재작성
  log('각 급수 DB를 2자로 축소 중...', 'info');

  // 8급: index.html 내장(48자)이라 캐시 조작 불가
  // → 48자 전체를 progress에 완료 처리 (이미 수일간 테스트 완료)
  const grade8All = ['一','九','十','二','人','七','八','女','大','山','三','小','寸','土','六','木','父','水','五','王','月','日','中','火','母','民','白','北','四','生','外','兄','年','西','先','弟','東','門','長','靑','軍','南','室','校','國','萬','學','韓'];
  const today = new Date().toISOString().slice(0,10);
  const fakeProgress = JSON.parse(localStorage.getItem(LS_KEYS.progress)||'{}');
  grade8All.forEach(ch => {
    fakeProgress[ch] = { stage:1, nextReview:'9999-99-99', lastScore:85, learnDate:today, grade:'8급' };
  });
  localStorage.setItem(LS_KEYS.progress, JSON.stringify(fakeProgress));
  log(`✓ 8급: 48자 전체 완료 처리 → 앱 시작 시 바로 7급으로 진입`, 'ok');

  // 7급~1급b: fetch 후 2자로 슬라이스하여 캐시에 저장
  for(const g of ALL_GRADES.slice(1)){
    try{
      // 기존 캐시가 있으면 그걸 슬라이스, 없으면 fetch
      let chars = null;
      const cached = localStorage.getItem('hanja_db_' + g);
      if(cached){
        const data = JSON.parse(cached);
        if(data[g] && data[g].length > 0){
          chars = data[g];
          log(`${g}: 캐시 사용 (${chars.length}자)`, 'info');
        }
      }

      if(!chars){
        log(`${g}: fetch 중...`, 'info');
        const url = DATA_BASE_URL + encodeURIComponent(g) + '.json';
        const res = await fetch(url, {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if(!data[g] || !data[g].length) throw new Error('데이터 없음');
        chars = data[g];
        log(`${g}: fetch 성공 (${chars.length}자)`, 'ok');
      }

      // 2자로 슬라이스 후 캐시 저장
      const sliced = chars.slice(0, CHARS_PER_GRADE);
      const saveData = { [g]: sliced };
      localStorage.setItem('hanja_db_' + g, JSON.stringify(saveData));
      log(`✓ ${g}: ${sliced.map(h=>h.char).join(' ')} (${sliced.length}자로 축소)`, 'ok');

    } catch(e) {
      log(`✗ ${g}: ${e.message}`, 'err');
    }
  }

  log('━━━ 설정 완료! 앱을 열어 테스트하세요 ━━━', 'ok');

  btn.disabled = false;
  btn.textContent = '🧪 테스트 모드 설정 (진도 삭제 + 각 급수 2자)';

  refreshState();

  // 안내 배너 변경
  document.getElementById('banner-info').className = 'banner ok';
  document.getElementById('banner-info').innerHTML =
    '✅ 테스트 모드 설정 완료!<br>아래 "한자쓰기 앱 열기"를 눌러 신규 유저 플로우를 확인하세요.<br>테스트 후 반드시 "원래 데이터로 복원"을 눌러주세요.';
}

// ── 백업 복원 ──
function restoreBackup(){
  const raw = localStorage.getItem('hanja_TEST_BACKUP');
  if(!raw){ alert('백업 데이터가 없습니다.'); return; }

  const backup = JSON.parse(raw);
  if(!confirm('백업 데이터로 복원하시겠어요?\n(' + backup.savedAt + ' 저장분)')){
    return;
  }

  log('━━━ 원래 데이터 복원 중 ━━━', 'ok');

  // 진도/유저 복원
  localStorage.setItem(LS_KEYS.progress,     JSON.stringify(backup.progress||{}));
  localStorage.setItem(LS_KEYS.user,         JSON.stringify(backup.user||{}));
  localStorage.setItem(LS_KEYS.positions,    JSON.stringify(backup.positions||{}));
  localStorage.setItem(LS_KEYS.testPass,     JSON.stringify(backup.testPass||{}));
  localStorage.setItem(LS_KEYS.completeSeen, JSON.stringify(backup.completeSeen||[]));
  log('✓ 진도/유저/위치/테스트기록 복원', 'ok');

  // DB 캐시는 삭제 (앱이 알아서 다시 fetch)
  ALL_GRADES.slice(1).forEach(g => {
    localStorage.removeItem('hanja_db_' + g);
  });
  log('✓ DB 캐시 삭제 (앱 재시작 시 자동 재다운로드)', 'info');

  // 백업 데이터 삭제
  localStorage.removeItem('hanja_TEST_BACKUP');
  log('✓ 테스트 백업 삭제', 'info');
  log('━━━ 복원 완료! ━━━', 'ok');

  document.getElementById('banner-info').className = 'banner ok';
  document.getElementById('banner-info').innerHTML =
    '✅ 복원 완료! 원래 데이터로 돌아왔습니다.';

  refreshState();
}

// ── 초기 로드 ──
refreshState();
log('test-helper.html 로드 완료', 'info');
</script>
</body>
</html>
