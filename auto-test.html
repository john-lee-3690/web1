<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>한자쓰기 자동 테스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}

/* ── 헤더 ── */
.header{
  background:linear-gradient(135deg,#1a1f2e 0%,#0f1117 100%);
  border-bottom:1px solid #2d3748;
  padding:16px 20px;
  position:sticky;top:0;z-index:100;
}
.header h1{font-size:18px;font-weight:700;color:#63b3ed;letter-spacing:-.3px}
.header p{font-size:12px;color:#718096;margin-top:2px}

/* ── 메인 ── */
.main{max-width:480px;margin:0 auto;padding:16px}

/* ── 상태 카드 ── */
.status-card{
  background:#1a202c;border:1px solid #2d3748;border-radius:12px;
  padding:16px;margin-bottom:16px;
}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.idle{background:#4a5568}
.status-dot.running{background:#f6ad55;animation:pulse .8s ease-in-out infinite}
.status-dot.done{background:#68d391}
.status-dot.error{background:#fc8181}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-label{font-size:14px;font-weight:600;color:#e2e8f0}
.status-sub{font-size:12px;color:#718096;margin-left:20px}

/* ── 현재 작업 표시 ── */
.current-task{
  background:#2d3748;border-radius:8px;padding:10px 14px;
  font-size:13px;color:#90cdf4;font-family:monospace;
  min-height:36px;word-break:break-all;line-height:1.5;
  display:none;
}
.current-task.show{display:block}

/* ── 급수 진행 바 ── */
.grade-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.grade-row{
  background:#1a202c;border:1px solid #2d3748;border-radius:10px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;
}
.grade-row.active{border-color:#63b3ed;background:#1a2744}
.grade-row.done{border-color:#48bb78;background:#1a2d1a}
.grade-row.error{border-color:#fc8181;background:#2d1a1a}
.grade-badge{
  font-size:13px;font-weight:700;color:#e2e8f0;
  min-width:48px;flex-shrink:0;
}
.grade-progress{flex:1}
.grade-bar-bg{height:6px;background:#2d3748;border-radius:3px;overflow:hidden;margin-bottom:4px}
.grade-bar-fill{height:100%;background:#63b3ed;border-radius:3px;transition:width .3s ease;width:0%}
.grade-bar-fill.done{background:#48bb78}
.grade-bar-fill.error{background:#fc8181}
.grade-info{font-size:11px;color:#718096}
.grade-result{font-size:12px;font-weight:600;flex-shrink:0;min-width:60px;text-align:right}
.grade-result.ok{color:#68d391}
.grade-result.fail{color:#fc8181}
.grade-result.skip{color:#f6ad55}

/* ── 컨트롤 버튼 ── */
.btn-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{
  flex:1;min-width:120px;padding:14px 20px;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;letter-spacing:-.2px;
}
.btn:active{transform:scale(0.97)}
.btn-start{background:#3182ce;color:#fff}
.btn-start:hover{background:#2b6cb0}
.btn-start:disabled{background:#2d3748;color:#4a5568;cursor:default;transform:none}
.btn-reset{background:#2d3748;color:#a0aec0;border:1px solid #4a5568}
.btn-reset:hover{background:#4a5568}

/* ── 로그 ── */
.log-wrap{
  background:#0d1117;border:1px solid #2d3748;border-radius:10px;
  overflow:hidden;
}
.log-header{
  background:#161b22;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #2d3748;
}
.log-header span{font-size:12px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.log-clear{font-size:11px;color:#4a5568;cursor:pointer;padding:4px 8px;border-radius:4px;background:none;border:none;color:#6e7681}
.log-clear:hover{color:#8b949e}
.log-body{height:280px;overflow-y:auto;padding:10px 14px;font-family:monospace;font-size:12px;line-height:1.7}
.log-line{display:flex;gap:8px;word-break:break-all}
.log-time{color:#4a5568;flex-shrink:0;font-size:11px}
.log-msg{flex:1}
.log-msg.info{color:#8b949e}
.log-msg.ok{color:#56d364}
.log-msg.warn{color:#e3b341}
.log-msg.err{color:#f85149}
.log-msg.head{color:#79c0ff;font-weight:700}

/* ── 최종 리포트 ── */
.report{
  background:#1a202c;border:1px solid #2d3748;border-radius:12px;
  padding:16px;margin-top:16px;display:none;
}
.report.show{display:block}
.report h3{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:12px}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.report-item{background:#2d3748;border-radius:8px;padding:10px 12px;text-align:center}
.report-num{font-size:24px;font-weight:800;color:#63b3ed;line-height:1}
.report-num.ok{color:#68d391}
.report-num.err{color:#fc8181}
.report-label{font-size:11px;color:#718096;margin-top:4px}
.report-issues{margin-top:8px}
.report-issue{background:#2d1a1a;border:1px solid #744210;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:#fc8181;line-height:1.5}
.report-issue .issue-title{font-weight:700;color:#f6ad55;margin-bottom:4px}
.report-ok-msg{text-align:center;padding:16px;color:#68d391;font-weight:600;font-size:14px}

/* ── 스피너 ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #4a5568;border-top-color:#63b3ed;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 옵션 ── */
.option-row{background:#1a202c;border:1px solid #2d3748;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.option-row label{font-size:13px;color:#a0aec0;display:flex;align-items:center;gap:8px;cursor:pointer}
.option-row input[type=checkbox]{width:16px;height:16px;accent-color:#3182ce}
.option-row select{background:#2d3748;border:1px solid #4a5568;color:#e2e8f0;border-radius:6px;padding:6px 10px;font-size:13px;margin-top:8px;width:100%}
.option-section-title{font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
</style>
</head>
<body>

<div class="header">
  <h1>🧪 한자쓰기 자동 테스트</h1>
  <p>7급 → 1급 승급 플로우 자동 검증</p>
</div>

<div class="main">

  <!-- 상태 카드 -->
  <div class="status-card">
    <div class="status-row">
      <div class="status-dot idle" id="status-dot"></div>
      <div class="status-label" id="status-label">대기 중</div>
    </div>
    <div class="status-sub" id="status-sub">테스트 시작 버튼을 눌러주세요</div>
    <div class="current-task" id="current-task"></div>
  </div>

  <!-- 옵션 -->
  <div class="option-row" id="option-panel">
    <div class="option-section-title">테스트 시작 급수</div>
    <select id="start-grade">
      <option value="7급">7급부터</option>
      <option value="6급">6급부터</option>
      <option value="5급">5급부터</option>
      <option value="4급a">4급a부터</option>
      <option value="4급b">4급b부터</option>
      <option value="3급a">3급a부터</option>
      <option value="3급b">3급b부터</option>
      <option value="2급">2급부터</option>
      <option value="1급a">1급a부터</option>
      <option value="1급b">1급b부터</option>
    </select>
    <div style="margin-top:10px">
      <label><input type="checkbox" id="opt-clear-cache"> 테스트 전 localStorage 캐시 클리어</label>
    </div>
    <div style="margin-top:6px">
      <label><input type="checkbox" id="opt-test-mode" checked> 테스트 모드도 포함 (학습 + 테스트 모두 검증)</label>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startTest()">▶ 테스트 시작</button>
    <button class="btn btn-reset" onclick="resetAll()">↺ 초기화</button>
  </div>

  <!-- 급수별 진행 -->
  <div class="grade-list" id="grade-list"></div>

  <!-- 로그 -->
  <div class="log-wrap">
    <div class="log-header">
      <span>📋 테스트 로그</span>
      <button class="log-clear" onclick="clearLog()">지우기</button>
    </div>
    <div class="log-body" id="log-body"></div>
  </div>

  <!-- 최종 리포트 -->
  <div class="report" id="report">
    <h3>📊 최종 테스트 리포트</h3>
    <div class="report-grid" id="report-grid"></div>
    <div class="report-issues" id="report-issues"></div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════
// 설정
// ════════════════════════════════════════════════
const DATA_BASE_URL = './';
const ALL_GRADES = ['7급','6급','5급','4급a','4급b','3급a','3급b','2급','1급a','1급b'];
const FAKE_SCORE = 85; // 자동 획 입력 시 사용할 점수

// ════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════
let isRunning = false;
let gradeResults = {}; // { '7급': { status, charCount, issues, elapsed } }
let issues = [];

// ════════════════════════════════════════════════
// 로그
// ════════════════════════════════════════════════
function log(msg, type='info'){
  const body = document.getElementById('log-body');
  const line = document.createElement('div');
  line.className = 'log-line';
  const t = new Date().toTimeString().slice(0,8);
  line.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}
function clearLog(){
  document.getElementById('log-body').innerHTML = '';
}

// ════════════════════════════════════════════════
// UI 업데이트
// ════════════════════════════════════════════════
function setStatus(label, sub, state='idle'){
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-label').textContent = label;
  document.getElementById('status-sub').textContent = sub;
}
function setCurrentTask(msg){
  const el = document.getElementById('current-task');
  if(msg){
    el.textContent = msg;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function initGradeRows(grades){
  const list = document.getElementById('grade-list');
  list.innerHTML = '';
  grades.forEach(g => {
    const row = document.createElement('div');
    row.className = 'grade-row';
    row.id = 'grade-row-' + g;
    row.innerHTML = `
      <div class="grade-badge">${g}</div>
      <div class="grade-progress">
        <div class="grade-bar-bg"><div class="grade-bar-fill" id="bar-${g}"></div></div>
        <div class="grade-info" id="info-${g}">대기 중</div>
      </div>
      <div class="grade-result" id="result-${g}">-</div>
    `;
    list.appendChild(row);
  });
}

function updateGradeRow(g, pct, infoText, resultText, resultCls, rowCls){
  const row = document.getElementById('grade-row-' + g);
  const bar = document.getElementById('bar-' + g);
  const info = document.getElementById('info-' + g);
  const result = document.getElementById('result-' + g);
  if(row && rowCls) row.className = 'grade-row ' + rowCls;
  if(bar){ bar.style.width = pct + '%'; if(rowCls) bar.className='grade-bar-fill '+(rowCls==='done'?'done':rowCls==='error'?'error':''); }
  if(info) info.textContent = infoText;
  if(result){ result.textContent = resultText; result.className = 'grade-result ' + (resultCls||''); }
}

// ════════════════════════════════════════════════
// 핵심: 급수 JSON fetch 테스트
// ════════════════════════════════════════════════
async function fetchGrade(g){
  const url = DATA_BASE_URL + encodeURIComponent(g) + '.json';
  setCurrentTask(`fetch: ${url}`);
  const start = Date.now();

  let res;
  try {
    res = await fetch(url, {cache: 'no-store'});
  } catch(e) {
    throw new Error(`네트워크 오류: ${e.message}`);
  }

  if(!res.ok){
    throw new Error(`HTTP ${res.status} — ${url}`);
  }

  let data;
  try {
    data = await res.json();
  } catch(e) {
    throw new Error(`JSON 파싱 실패: ${e.message}`);
  }

  const elapsed = Date.now() - start;

  // 데이터 구조 검증
  if(!data[g]){
    throw new Error(`data["${g}"] 키 없음. 실제 키: ${Object.keys(data).join(', ')}`);
  }
  if(!Array.isArray(data[g])){
    throw new Error(`data["${g}"]이 배열이 아님`);
  }
  if(data[g].length === 0){
    throw new Error(`data["${g}"] 배열이 비어있음`);
  }

  return { data: data[g], elapsed };
}

// ════════════════════════════════════════════════
// 한자 데이터 검증
// ════════════════════════════════════════════════
function validateChars(g, chars){
  const problems = [];
  chars.forEach((h, i) => {
    const ctx = `[${g}][${i}] ${h.char||'?'}`;
    if(!h.char)         problems.push(`${ctx}: char 없음`);
    if(!h.mean)         problems.push(`${ctx}: mean 없음`);
    if(!h.read)         problems.push(`${ctx}: read 없음`);
    if(!h.strokeCount || h.strokeCount < 1)
                        problems.push(`${ctx}: strokeCount 없음`);
    if(!h.medians || !Array.isArray(h.medians))
                        problems.push(`${ctx}: medians 없음`);
    else if(h.medians.length !== h.strokeCount)
                        problems.push(`${ctx}: medians 수(${h.medians.length}) ≠ strokeCount(${h.strokeCount})`);
    else {
      h.medians.forEach((m, si) => {
        if(!Array.isArray(m) || m.length < 2)
          problems.push(`${ctx} ${si+1}획: median 포인트 부족 (${m?.length||0}개)`);
      });
    }
  });
  return problems;
}

// ════════════════════════════════════════════════
// 획 자동 입력 시뮬레이션
// (실제 canvas 없이 strokeSimilarity 로직을 재현)
// ════════════════════════════════════════════════
function simulateStroke(median, sz=300){
  // median 좌표 → canvas 픽셀 좌표로 변환 (tqM2c 함수와 동일한 로직)
  const pad = sz * 0.05;
  const inner = sz - pad * 2;
  return median.map(p => ({
    x: pad + ((p[0] - 0.059) / (0.967 - 0.059)) * inner,
    y: pad + ((p[1] - 0.040) / (0.953 - 0.040)) * inner
  }));
}

function strokeSim(userPts, median, sz=300){
  if(userPts.length < 2) return 0;
  const pad = sz * 0.05;
  const inner = sz - pad * 2;
  const m2c = p => ({
    x: pad + ((p[0]-0.059)/(0.967-0.059))*inner,
    y: pad + ((p[1]-0.040)/(0.953-0.040))*inner
  });
  const gs = m2c(median[0]);
  const ge = m2c(median[median.length-1]);
  const us = userPts[0], ue = userPts[userPts.length-1];
  const startD = Math.sqrt((us.x-gs.x)**2+(us.y-gs.y)**2);
  const posSc = Math.max(0, 1 - startD/(sz*0.32));
  const gAng = Math.atan2(ge.y-gs.y, ge.x-gs.x);
  const uAng = Math.atan2(ue.y-us.y, ue.x-us.x);
  let dAng = Math.abs(gAng-uAng);
  if(dAng > Math.PI) dAng = 2*Math.PI-dAng;
  const dirSc = Math.max(0, 1-dAng/(Math.PI*0.7));
  const gLen = Math.sqrt((ge.x-gs.x)**2+(ge.y-gs.y)**2);
  const uLen = Math.sqrt((ue.x-us.x)**2+(ue.y-us.y)**2);
  const lenRatio = gLen>5 ? Math.min(uLen/gLen,gLen/uLen) : 1;
  return posSc*0.4 + dirSc*0.4 + Math.max(0,lenRatio)*0.2;
}

// median으로 만든 자동 획의 실제 유사도 계산
function calcAutoStrokeSim(median, sz=300){
  const pts = simulateStroke(median, sz);
  return strokeSim(pts, median, sz);
}

// 한자 전체 자동 정답 유사도 검증
function validateStrokeSims(g, chars){
  const problems = [];
  const THRESHOLD = 0.28; // tqStrokeSim 임계값
  chars.forEach(h => {
    if(!h.medians) return;
    h.medians.forEach((med, si) => {
      const sim = calcAutoStrokeSim(med);
      if(sim < THRESHOLD){
        problems.push(`${h.char}(${h.mean}) ${si+1}획 자동입력 유사도=${sim.toFixed(2)} < ${THRESHOLD} (통과 불가)`);
      }
    });
  });
  return problems;
}

// ════════════════════════════════════════════════
// 테스트 모드(20문제) 시뮬레이션
// ════════════════════════════════════════════════
function simulateTestMode(g, chars){
  // 20문제 랜덤 추출 (실제 buildTestPool 로직 재현)
  const TOTAL = 20;
  let pool = chars.map((h,i) => ({grade:g, idx:i, char:h.char, mean:h.mean}));
  // Fisher-Yates 셔플
  for(let i=pool.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  const questions = pool.slice(0, Math.min(TOTAL, pool.length));

  // 각 문제 자동 정답 처리
  let passed = 0, failed = 0;
  const failedChars = [];
  questions.forEach(q => {
    const h = chars[q.idx];
    if(!h || !h.medians){ failed++; failedChars.push(q.char+'(medians없음)'); return; }
    // 각 획 유사도 계산
    const scores = h.medians.map(med => {
      const sim = calcAutoStrokeSim(med);
      return Math.round(sim * 100);
    });
    const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    if(avg >= 60){ passed++; }
    else { failed++; failedChars.push(`${q.char}(avg:${avg})`); }
  });

  const score = Math.round(passed / questions.length * 100);
  return { questions: questions.length, passed, failed, score, failedChars, testPass: score >= 80 };
}

// ════════════════════════════════════════════════
// 급수 테스트 실행
// ════════════════════════════════════════════════
async function testGrade(g, gradeIdx, total){
  const startTime = Date.now();
  const row = document.getElementById('grade-row-' + g);
  if(row) row.className = 'grade-row active';

  log(`━━━ ${g} 테스트 시작 (${gradeIdx+1}/${total}) ━━━`, 'head');
  updateGradeRow(g, 5, 'fetch 중...', '⟳', '', 'active');

  const gradeIssues = [];

  // 1. JSON fetch
  let chars;
  try {
    setCurrentTask(`${g}.json 다운로드 중...`);
    const { data, elapsed } = await fetchGrade(g);
    chars = data;
    log(`✓ fetch 성공 — ${chars.length}자, ${elapsed}ms`, 'ok');
    updateGradeRow(g, 20, `${chars.length}자 로드됨`, '✓fetch', 'ok', 'active');
  } catch(e) {
    log(`✗ fetch 실패: ${e.message}`, 'err');
    gradeIssues.push({ type:'FETCH', msg: e.message });
    updateGradeRow(g, 100, 'fetch 실패', '✗', 'fail', 'error');
    return { status:'fetch_fail', issues:gradeIssues, elapsed: Date.now()-startTime };
  }

  // 2. 데이터 구조 검증
  setCurrentTask(`${g} 데이터 구조 검증 중...`);
  updateGradeRow(g, 35, '데이터 검증 중...', '✓fetch', 'ok', 'active');
  await sleep(80);

  const structProblems = validateChars(g, chars);
  if(structProblems.length > 0){
    structProblems.forEach(p => {
      log(`⚠ 데이터 오류: ${p}`, 'warn');
      gradeIssues.push({ type:'DATA', msg: p });
    });
  } else {
    log(`✓ 데이터 구조 이상 없음 (char/mean/read/strokeCount/medians)`, 'ok');
  }
  updateGradeRow(g, 50, `구조검증 완료 (오류:${structProblems.length}건)`, '✓data', structProblems.length?'fail':'ok', 'active');

  // 3. 획 자동입력 유사도 검증 (자동 정답이 THRESHOLD를 넘는지)
  setCurrentTask(`${g} 획 유사도 검증 중...`);
  await sleep(80);

  const simProblems = validateStrokeSims(g, chars);
  if(simProblems.length > 0){
    simProblems.forEach(p => {
      log(`⚠ 획 유사도 미달: ${p}`, 'warn');
      gradeIssues.push({ type:'STROKE_SIM', msg: p });
    });
  } else {
    log(`✓ 모든 획 자동입력 유사도 threshold(0.28) 통과`, 'ok');
  }
  updateGradeRow(g, 70, `획유사도 검증 완료`, '✓sim', simProblems.length?'fail':'ok', 'active');

  // 4. 테스트 모드 시뮬레이션
  let testResult = null;
  if(document.getElementById('opt-test-mode').checked){
    setCurrentTask(`${g} 테스트 모드(20문제) 시뮬레이션 중...`);
    await sleep(80);
    testResult = simulateTestMode(g, chars);
    if(testResult.testPass){
      log(`✓ 테스트모드: ${testResult.questions}문제 중 ${testResult.passed}개 정답 → ${testResult.score}점 (통과)`, 'ok');
    } else {
      log(`✗ 테스트모드: ${testResult.score}점 (80점 미달)`, 'err');
      if(testResult.failedChars.length > 0){
        log(`  오류 한자: ${testResult.failedChars.join(', ')}`, 'warn');
        gradeIssues.push({ type:'TEST_SCORE', msg: `테스트모드 ${testResult.score}점 — 오류 한자: ${testResult.failedChars.join(', ')}` });
      }
    }
  }

  // 5. 승급 조건 확인 (모든 글자 lastScore>=80 세팅 가능 여부)
  setCurrentTask(`${g} 승급 조건 시뮬레이션 중...`);
  await sleep(80);

  // progress를 시뮬레이션: 모든 글자 80점으로 세팅
  const today = new Date().toISOString().slice(0,10);
  const fakeProgress = {};
  chars.forEach(h => {
    fakeProgress[h.char] = { stage:1, nextReview: today, lastScore:85, learnDate:today, grade:g };
  });

  // isGradeFull 조건 확인
  const isGradeFull = chars.every(h => (fakeProgress[h.char]||{}).lastScore >= 80);
  if(isGradeFull){
    log(`✓ 승급조건: 전체 ${chars.length}자 80점 이상 가능 → isGradeFull=true`, 'ok');
  } else {
    log(`✗ 승급조건 실패: isGradeFull=false`, 'err');
    gradeIssues.push({ type:'ADVANCE', msg: 'isGradeFull 조건 실패' });
  }

  const elapsed = Date.now() - startTime;
  const hasErrors = gradeIssues.length > 0;
  const status = hasErrors ? 'issues' : 'ok';

  updateGradeRow(g, 100,
    `완료 — ${chars.length}자, ${elapsed}ms${testResult?' | 테스트'+testResult.score+'점':''}`,
    hasErrors ? `⚠${gradeIssues.length}건` : '✓ 통과',
    hasErrors ? 'fail' : 'ok',
    hasErrors ? 'error' : 'done'
  );

  return { status, charCount:chars.length, issues:gradeIssues, elapsed, testResult };
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ════════════════════════════════════════════════
// 메인 테스트 실행
// ════════════════════════════════════════════════
async function startTest(){
  if(isRunning) return;
  isRunning = true;
  issues = [];
  gradeResults = {};

  document.getElementById('btn-start').disabled = true;
  document.getElementById('option-panel').style.display = 'none';
  document.getElementById('report').classList.remove('show');

  // 시작 급수 결정
  const startGrade = document.getElementById('start-grade').value;
  const startIdx = ALL_GRADES.indexOf(startGrade);
  const grades = ALL_GRADES.slice(startIdx);

  // localStorage 캐시 클리어
  if(document.getElementById('opt-clear-cache').checked){
    grades.forEach(g => {
      try{ localStorage.removeItem('hanja_db_' + g); }catch(e){}
    });
    log('✓ localStorage 캐시 클리어 완료', 'ok');
  }

  initGradeRows(grades);
  setStatus('테스트 실행 중', `${startGrade} → 1급b 순서로 검증`, 'running');
  log(`테스트 시작: ${startGrade} → 1급b (${grades.length}개 급수)`, 'head');

  const totalStart = Date.now();

  for(let i=0; i<grades.length; i++){
    const g = grades[i];
    setStatus(`테스트 중: ${g}`, `${i+1} / ${grades.length} 진행중`, 'running');

    try {
      const result = await testGrade(g, i, grades.length);
      gradeResults[g] = result;
      if(result.issues) issues.push(...result.issues.map(iss=>({grade:g, ...iss})));
    } catch(e) {
      log(`✗ 예기치 않은 오류: ${e.message}`, 'err');
      gradeResults[g] = { status:'exception', issues:[{type:'EXCEPTION', msg:e.message}], elapsed:0 };
      issues.push({ grade:g, type:'EXCEPTION', msg:e.message });
      updateGradeRow(g, 100, '예외 오류', '✗', 'fail', 'error');
    }

    await sleep(200);
  }

  const totalElapsed = ((Date.now() - totalStart)/1000).toFixed(1);
  setCurrentTask('');

  // 최종 집계
  const okGrades = grades.filter(g => gradeResults[g]?.status === 'ok');
  const warnGrades = grades.filter(g => gradeResults[g]?.status === 'issues');
  const failGrades = grades.filter(g => ['fetch_fail','exception'].includes(gradeResults[g]?.status));

  if(issues.length === 0){
    setStatus('✅ 모든 테스트 통과', `${grades.length}개 급수 이상 없음 — ${totalElapsed}s`, 'done');
    log(`━━━ 완료: 전 급수 이상 없음 (${totalElapsed}s) ━━━`, 'ok');
  } else {
    setStatus(`⚠ 테스트 완료 — 이슈 ${issues.length}건`, `통과:${okGrades.length} 경고:${warnGrades.length} 실패:${failGrades.length}`, 'error');
    log(`━━━ 완료: 이슈 ${issues.length}건 발견 (${totalElapsed}s) ━━━`, 'warn');
  }

  showReport(grades, okGrades, warnGrades, failGrades, totalElapsed);

  isRunning = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-start').textContent = '▶ 다시 테스트';
}

// ════════════════════════════════════════════════
// 리포트
// ════════════════════════════════════════════════
function showReport(grades, ok, warn, fail, elapsed){
  const report = document.getElementById('report');
  report.classList.add('show');

  const totalChars = grades.reduce((a,g) => a + (gradeResults[g]?.charCount||0), 0);

  document.getElementById('report-grid').innerHTML = `
    <div class="report-item">
      <div class="report-num ok">${ok.length}</div>
      <div class="report-label">통과 급수</div>
    </div>
    <div class="report-item">
      <div class="report-num ${fail.length||warn.length?'err':'ok'}">${warn.length + fail.length}</div>
      <div class="report-label">이슈 급수</div>
    </div>
    <div class="report-item">
      <div class="report-num">${totalChars}</div>
      <div class="report-label">총 한자 수</div>
    </div>
    <div class="report-item">
      <div class="report-num">${elapsed}s</div>
      <div class="report-label">소요 시간</div>
    </div>
  `;

  const issuesEl = document.getElementById('report-issues');
  if(issues.length === 0){
    issuesEl.innerHTML = '<div class="report-ok-msg">🎉 이슈 없음! 프로덕션 배포 가능합니다</div>';
  } else {
    // 타입별 그룹핑
    const groups = {};
    issues.forEach(iss => {
      if(!groups[iss.type]) groups[iss.type] = [];
      groups[iss.type].push(iss);
    });
    issuesEl.innerHTML = Object.entries(groups).map(([type, list]) => {
      const titles = {
        FETCH: '🔴 fetch 실패',
        DATA: '🟠 데이터 구조 오류',
        STROKE_SIM: '🟡 획 자동입력 유사도 미달',
        TEST_SCORE: '🟠 테스트 점수 부족',
        ADVANCE: '🔴 승급 조건 오류',
        EXCEPTION: '🔴 예외 오류',
      };
      return `<div class="report-issue">
        <div class="issue-title">${titles[type]||type} (${list.length}건)</div>
        ${list.map(iss=>`• [${iss.grade}] ${iss.msg}`).join('<br>')}
      </div>`;
    }).join('');
  }
}

// ════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════
function resetAll(){
  if(isRunning) return;
  document.getElementById('grade-list').innerHTML = '';
  document.getElementById('report').classList.remove('show');
  document.getElementById('option-panel').style.display = '';
  document.getElementById('btn-start').textContent = '▶ 테스트 시작';
  document.getElementById('btn-start').disabled = false;
  setStatus('대기 중', '테스트 시작 버튼을 눌러주세요', 'idle');
  setCurrentTask('');
  clearLog();
  issues = [];
  gradeResults = {};
}

</script>
